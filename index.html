<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan SDN 1 SERUNI MUMBUL</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #0c3da3;
            --secondary-color: #27ae60;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: var(--primary-color);
            padding: 30px;
            color: white;
        }

        .logo-container img {
            width: 100px;
            height: auto;
            border-radius: 10px;
            background: white;
            padding: 5px;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .login-box label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .input-nisn {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 18px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .input-nisn:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-cek {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-cek:hover {
            background: #092d7a;
            transform: scale(1.02);
        }

        /* Result Area */
        #result-area {
            display: none;
            padding: 20px 0;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 10px;
        }

        .name-display {
            font-size: 22px;
            font-weight: bold;
            color: #2d3436;
        }

        .status-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 800;
            margin: 15px 0;
            color: white;
        }

        .lulus { background: var(--secondary-color); box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); }

        .score-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .score-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .score-label { font-size: 12px; color: #666; font-weight: bold; margin-bottom: 5px; }
        .score-value { font-size: 20px; font-weight: bold; color: var(--primary-color); }
        .score-desc { font-size: 12px; font-style: italic; }

        .btn-reset {
            margin-top: 25px;
            background: none;
            border: 1px solid #ccc;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            color: #666;
        }
    </style>
</head>

            <button class="btn-reset" onclick="location.reload()">Kembali</button>

    </div>
</div>

    function cekKelulusan() {
        const input = document.getElementById('nisn-input').value;
        const siswa = dataSiswa.find(s => s.nisn === input);

        if (siswa) {
            // Sembunyikan login, tampilkan hasil
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            // Isi data
            document.getElementById('res-nama').innerText = siswa.nama;
            document.getElementById('res-nisn').innerText = "NISN: " + siswa.nisn;
            document.getElementById('res-mtk').innerText = siswa.mtk;
            document.getElementById('res-mtk-desc').innerText = "(" + siswa.mtk_desc + ")";
            document.getElementById('res-indo').innerText = siswa.indo;
            document.getElementById('res-indo-desc').innerText = "(" + siswa.indo_desc + ")";

            // Jalankan kembang api
            celebrate();
        } else {
            alert("Nomor NISN tidak ditemukan! Silakan cek kembali nomor Anda.");
        }
    }

    function celebrate() {
        var duration = 5 * 1000;
        var end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#0c3da3', '#27ae60', '#f1c40f']
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#0c3da3', '#27ae60', '#f1c40f']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }
